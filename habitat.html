<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokopia DB - 서식지</title>
    
    <link rel="stylesheet" href="./style.css?v=1.4">
    <script src="./theme.js?v=1.0" defer></script>
    <script src="./habitatData.js?v=1.0"></script>
</head>
<body>
    
<nav id="topNavbar">
    <div class="nav-logo">
        <img src="./images/logo.png" alt="로고" onerror="this.src='https://via.placeholder.com/100x30?text=LOGO';">
    </div>
    <div class="nav-menu">
        <a href="index.html" class="nav-link">포켓몬</a>
        <a href="habitat.html" class="nav-link active">서식지</a>
        
        <button class="theme-toggle-btn" id="themeToggle" title="다크 모드 변경">&#127183;</button>
    </div>
</nav>

<header id="mainHeader">
    <div class="filter-container">
        <div class="filter-group">
            <div class="group-label">필요 재료</div>
            <div id="materialOptions" class="group-content"></div>
        </div>
    </div>

    <div class="header-controls">
        <button class="toggle-btn" onclick="toggleHeader()">
            <span class="toggle-text">필터 접기</span>
            <svg class="toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </button>
        <button class="reset-btn" onclick="resetAllFilters()">필터 초기화</button>
    </div>

    <div class="search-section">
        <div class="search-row">
            <input type="text" id="searchHabitatName" class="search-input w-4" placeholder="서식지 이름 검색" oninput="applyFilters()">
            <input type="text" id="searchMaterial" class="search-input w-4" placeholder="재료 검색" oninput="applyFilters()">
        </div>
    </div>
</header>

<div class="pokemon-grid" id="habitatList"></div>

<button id="scrollTopBtn" onclick="scrollToTop()" title="맨 위로 가기">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
</button>

<script src="./habitatScript.js?v=1.0"></script>

</body>
</html>
